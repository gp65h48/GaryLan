<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM 樹狀階層差異分析系統</title>
    <!-- 載入必要函式庫：CSV 解析, Excel 處理, Tailwind CSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        
        body { 
            font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
        }

        .diff-added { background-color: #f0fdf4; border-left: 4px solid #22c55e; }
        .diff-deleted { background-color: #fef2f2; border-left: 4px solid #ef4444; }
        .diff-modified { background-color: #fffbeb; border-left: 4px solid #f59e0b; }
        
        /* 樹狀階層導引線樣式 */
        .indent-line {
            border-left: 2px solid #e2e8f0;
            margin-left: 10px;
            padding-left: 14px;
            display: inline-block;
            height: 1.5rem;
            vertical-align: middle;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-12">

    <div class="max-w-[1600px] mx-auto p-4 md:p-8">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-950 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    BOM 樹狀階層差異分析系統
                </h1>
                <p class="text-slate-500 text-sm mt-2 flex flex-wrap items-center gap-3">
                    <span class="px-2.5 py-1 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold tracking-wider">STRUCTURE-FIRST ALGORITHM</span>
                    <span class="flex items-center gap-1">核心比對 10 大關鍵欄位 (Part, Qty, Mfr, etc.)</span>
                </p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button id="exportBtn" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-emerald-100 flex items-center gap-2 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    匯出比對報告 (.xlsx)
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-indigo-300 transition-colors">
                <label class="flex items-center gap-2 text-sm font-bold text-slate-700 mb-4">
                    <span class="w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-xs text-slate-500">1</span>
                    基準 BOM (舊版 / Baseline)
                </label>
                <input type="file" id="file1" accept=".csv, .xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-emerald-300 transition-colors">
                <label class="flex items-center gap-2 text-sm font-bold text-slate-700 mb-4">
                    <span class="w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-xs text-slate-500">2</span>
                    目標 BOM (新版 / Target)
                </label>
                <input type="file" id="file2" accept=".csv, .xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer">
            </div>
        </div>

        <div class="flex flex-col items-center mb-10">
            <button id="compareBtn" class="group relative bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 px-20 rounded-2xl shadow-xl shadow-indigo-200 transition-all hover:scale-105 active:scale-95">
                執行結構化深度比對
                <div class="absolute -top-2 -right-2 bg-amber-400 text-indigo-950 text-[10px] px-2 py-0.5 rounded-full animate-bounce">START</div>
            </button>
            <p id="msgBox" class="mt-4 text-sm font-bold text-red-500 hidden"></p>
        </div>

        <div id="dashboard" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 text-center shadow-sm">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Diffs</div>
                <div id="totalItems" class="text-3xl font-black text-slate-800">0</div>
            </div>
            <div class="bg-green-50 p-5 rounded-2xl border border-green-100 text-center shadow-sm">
                <div class="text-[10px] font-black text-green-500 uppercase tracking-widest mb-1">Added Items</div>
                <div id="countAdded" class="text-3xl font-black text-green-700">0</div>
            </div>
            <div class="bg-red-50 p-5 rounded-2xl border border-red-100 text-center shadow-sm">
                <div class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Deleted Items</div>
                <div id="countDeleted" class="text-3xl font-black text-red-700">0</div>
            </div>
            <div class="bg-amber-50 p-5 rounded-2xl border border-amber-100 text-center shadow-sm">
                <div class="text-[10px] font-black text-amber-600 uppercase tracking-widest mb-1">Modified Fields</div>
                <div id="countModified" class="text-3xl font-black text-amber-700">0</div>
            </div>
        </div>

        <div id="resultContainer" class="hidden bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase tracking-tighter">
                            <th class="px-6 py-5 w-28 text-center">Status</th>
                            <th class="px-6 py-5">Hierarchy / Part Information</th>
                            <th class="px-6 py-5 w-24 text-center">Item</th>
                            <th class="px-6 py-5">Parent Reference</th>
                            <th class="px-6 py-5">Change Details (Baseline ➔ Target)</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <!-- 載入中動畫 -->
        <div id="loader" class="hidden py-32 text-center">
            <div class="relative inline-block">
                <div class="h-16 w-16 rounded-full border-4 border-indigo-100 border-t-indigo-600 animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="h-8 w-8 rounded-full border-4 border-transparent border-t-amber-400 animate-spin-reverse"></div>
                </div>
            </div>
            <p class="mt-6 text-indigo-950 font-bold text-lg animate-pulse">正在解析結構並進行深度分析...</p>
        </div>
    </div>

    <script>
        const TARGET_COLS = ['Part', 'Qty', 'ExQty', 'UOM', 'CE', 'Rev', 'Critical', 'Mfr Part No', 'Mfr Name', 'Item Text'];
        let compareResults = [];
        let rootInfo = { oldRoot: null, newRoot: null };

        // 解析 Level 深度 (例如 "1.2" -> depth 1)
        function parseLevel(str) {
            const s = String(str || "").trim();
            const dotCount = (s.match(/\./g) || []).length;
            const depth = dotCount / 2;
            const val = s.replace(/[\s\.]/g, '');
            return { depth, val: parseInt(val) || 0, raw: s };
        }

        // 取得料號前綴 (用於模糊比對)
        function getPrefix(part) {
            const s = String(part || "").trim();
            const lastDash = s.lastIndexOf('-');
            return lastDash === -1 ? s : s.substring(0, lastDash);
        }

        function normItem(item) {
            const s = String(item || "").trim();
            const n = parseInt(s);
            return isNaN(n) ? s : String(n);
        }

        function normalizeData(data) {
            return data.map(row => {
                const normalized = {};
                Object.keys(row).forEach(k => {
                    const cleanK = k.trim().replace(/\s+/g, ' ');
                    normalized[cleanK] = row[k];
                });
                return normalized;
            });
        }

        function buildTree(data) {
            const root = { children: [], depth: -1 };
            const stack = [root];
            data.forEach(row => {
                const lv = parseLevel(row.Level);
                const node = { ...row, _lv: lv, children: [] };
                while (stack.length > 1 && stack[stack.length - 1]._lv.depth >= lv.depth) {
                    stack.pop();
                }
                stack[stack.length - 1].children.push(node);
                stack.push(node);
            });
            return root.children;
        }

        async function readExcel(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                    resolve(normalizeData(json));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function compareNodes(list1, list2, results) {
            const matched2 = new Set();
            const matched1 = new Set();

            // 1. 精確匹配 (Item + Full Part Number)
            list2.forEach((n2, idx2) => {
                const n1Idx = list1.findIndex((n1, idx1) => 
                    !matched1.has(idx1) && 
                    normItem(n1.Item) === normItem(n2.Item) && 
                    String(n1.Part).trim() === String(n2.Part).trim()
                );
                if (n1Idx !== -1) {
                    matched2.add(idx2);
                    matched1.add(n1Idx);
                    const n1 = list1[n1Idx];
                    checkChanges(n1, n2, results);
                    compareNodes(n1.children, n2.children, results);
                }
            });

            // 2. 模糊匹配 (Item + Part Prefix) -> 判定為變更
            list2.forEach((n2, idx2) => {
                if (matched2.has(idx2)) return;
                const n1Idx = list1.findIndex((n1, idx1) => 
                    !matched1.has(idx1) && 
                    normItem(n1.Item) === normItem(n2.Item) && 
                    getPrefix(n1.Part) === getPrefix(n2.Part)
                );
                if (n1Idx !== -1) {
                    matched2.add(idx2);
                    matched1.add(n1Idx);
                    const n1 = list1[n1Idx];
                    checkChanges(n1, n2, results);
                    compareNodes(n1.children, n2.children, results);
                }
            });

            // 3. 剩餘為新增
            list2.forEach((n2, idx2) => {
                if (!matched2.has(idx2)) {
                    results.push({ type: '新增', data: n2 });
                    addAllChildren(n2.children, results, '新增');
                }
            });

            // 4. 剩餘為刪除
            list1.forEach((n1, idx1) => {
                if (!matched1.has(idx1)) {
                    results.push({ type: '刪除', data: n1 });
                    addAllChildren(n1.children, results, '刪除');
                }
            });
        }

        function checkChanges(n1, n2, results) {
            const diffs = [];
            TARGET_COLS.forEach(col => {
                let v1 = String(n1[col] || "").trim();
                let v2 = String(n2[col] || "").trim();
                if (v1 !== v2) diffs.push({ col, v1, v2 });
            });
            if (diffs.length > 0) {
                results.push({ type: '變更', data: n2, diffs });
            }
        }

        function addAllChildren(children, results, type) {
            children.forEach(child => {
                results.push({ type: type, data: child });
                addAllChildren(child.children, results, type);
            });
        }

        function showMessage(msg, isError = true) {
            const box = document.getElementById('msgBox');
            box.innerText = msg;
            box.classList.remove('hidden');
            box.className = `mt-4 text-sm font-bold ${isError ? 'text-red-500' : 'text-indigo-600'}`;
            setTimeout(() => box.classList.add('hidden'), 5000);
        }

        document.getElementById('compareBtn').addEventListener('click', async () => {
            const f1 = document.getElementById('file1').files[0];
            const f2 = document.getElementById('file2').files[0];
            
            if (!f1 || !f2) {
                showMessage("請先選擇基準與目標兩個 BOM 檔案");
                return;
            }

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('resultContainer').classList.add('hidden');

            try {
                const [d1, d2] = await Promise.all([readExcel(f1), readExcel(f2)]);
                
                const r1 = d1.find(r => parseLevel(r.Level).depth === 0) || { Part: "Unknown", Rev: "" };
                const r2 = d2.find(r => parseLevel(r.Level).depth === 0) || { Part: "Unknown", Rev: "" };
                rootInfo = { oldRoot: r1, newRoot: r2 };

                const tree1 = buildTree(d1);
                const tree2 = buildTree(d2);

                compareResults = [];
                compareNodes(tree1, tree2, compareResults);
                
                render(compareResults);
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('exportBtn').classList.remove('hidden');
            } catch (e) {
                console.error(e);
                showMessage("比對過程發生錯誤，請檢查檔案格式。");
                document.getElementById('loader').classList.add('hidden');
            }
        });

        function render(data) {
            const body = document.getElementById('resultBody');
            body.innerHTML = '';
            let c = { '新增': 0, '刪除': 0, '變更': 0 };

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="py-32 text-center text-slate-400 font-medium italic">未偵測到任何關鍵欄位的變更。兩份 BOM 在結構與內容上完全一致。</td></tr>';
                return;
            }

            data.forEach(res => {
                c[res.type]++;
                const tr = document.createElement('tr');
                tr.className = `group border-b border-slate-50 transition-all ${res.type==='新增'?'diff-added':res.type==='刪除'?'diff-deleted':'diff-modified'}`;
                
                let detail = "";
                if (res.type === '變更') {
                    detail = res.diffs.map(d => {
                        const isHighPriority = d.col.includes('Mfr') || d.col === 'Part';
                        return `
                            <div class="flex items-center gap-2 mb-1.5 p-2 rounded-lg text-[11px] ${isHighPriority ? 'bg-indigo-50/50 border-l-2 border-indigo-500 font-bold' : 'bg-white/60 border border-slate-100'}">
                                <span class="w-24 text-slate-400 shrink-0 uppercase tracking-tighter">${d.col}</span>
                                <span class="text-slate-400 line-through truncate max-w-[150px]">${d.v1 || '(null)'}</span>
                                <span class="text-indigo-500 font-black">➔</span>
                                <span class="text-indigo-900 font-bold">${d.v2 || '(null)'}</span>
                            </div>
                        `;
                    }).join('');
                } else {
                    detail = `<span class="text-xs ${res.type==='新增'?'text-green-600':'text-red-600'} font-bold italic opacity-70">${res.type === '新增' ? '✚ New component introduced in target' : '✘ Component removed from baseline'}</span>`;
                }

                const indentLevel = res.data._lv.depth;
                let indentHTML = "";
                for(let i=0; i<indentLevel; i++) {
                    indentHTML += `<div class="indent-line"></div>`;
                }

                tr.innerHTML = `
                    <td class="px-6 py-6 text-center align-top">
                        <span class="inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase text-white shadow-sm ${res.type==='新增'?'bg-green-500':res.type==='刪除'?'bg-red-500':'bg-amber-500'}">
                            ${res.type}
                        </span>
                    </td>
                    <td class="px-6 py-6 align-top">
                        <div class="flex items-start">
                            ${indentHTML}
                            <div class="flex flex-col gap-1.5 ml-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] bg-slate-200/50 px-1.5 py-0.5 rounded text-slate-600 font-mono font-bold">${res.data.Level}</span>
                                    <span class="font-black text-slate-900 tracking-tight text-base">${res.data.Part}</span>
                                </div>
                                <div class="text-[11px] text-slate-500 font-medium">${res.data['Item Text'] || '(無說明)'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-6 text-center align-top font-mono font-bold text-indigo-600">${res.data.Item || '-'}</td>
                    <td class="px-6 py-6 align-top text-xs text-slate-400 font-semibold">${res.data.Parent || ''}</td>
                    <td class="px-6 py-6 align-top">${detail}</td>
                `;
                body.appendChild(tr);
            });

            document.getElementById('totalItems').innerText = data.length;
            document.getElementById('countAdded').innerText = c['新增'];
            document.getElementById('countDeleted').innerText = c['刪除'];
            document.getElementById('countModified').innerText = c['變更'];
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (compareResults.length === 0) return;

            let filename = "BOM_Comparison_Report.xlsx";
            const { oldRoot, newRoot } = rootInfo;
            if (oldRoot && newRoot) {
                const oldPart = String(oldRoot.Part).trim();
                const newPart = String(newRoot.Part).trim();
                filename = oldPart === newPart 
                    ? `${oldPart}_Rev${oldRoot.Rev}_to_Rev${newRoot.Rev}.xlsx`
                    : `${oldPart}_v_${newPart}.xlsx`;
            }

            const exportData = compareResults.map(r => {
                let diffText = r.type;
                if (r.type === '變更') {
                    diffText = r.diffs.map(d => `${d.col}: ${d.v1} -> ${d.v2}`).join(' | ');
                }
                return {
                    "Status": r.type,
                    "Level": r.data.Level,
                    "Item": r.data.Item,
                    "Part Number": r.data.Part,
                    "Parent": r.data.Parent,
                    "Details": diffText
                };
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(exportData);
            ws['!cols'] = [{ wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 25 }, { wch: 25 }, { wch: 80 }];
            XLSX.utils.book_append_sheet(wb, ws, "Comparison Results");
            XLSX.writeFile(wb, filename);
        });
    </script>
</body>
</html>
